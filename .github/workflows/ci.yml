name: Theme CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Main job that runs PHPStan and PHPCS
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-progress --prefer-dist

      # Have to run this so PHPStan has access to the classes referenced in /tests/
      - name: Build Codeception /_generated/ actor classes
        run: vendor/bin/codecept build

      - name: PHP Syntax smoke test
        run: |
          find . -name "*.php" -type f -not -path "./vendor/*" -not -path "./node_modules/*" -exec php -l {} \;

      - name: Run PHPStan
        run: vendor/bin/phpstan analyze . --configuration=phpstan.neon --memory-limit=2G

      - name: Run PHPCS
        run: vendor/bin/phpcs .

  # Parallel job that handles wp-browser tests
  wp-browser-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer
          extensions: mysql, sqlite3, pdo_sqlite # Ensure SQLite tools are ready

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-progress --prefer-dist

      - name: Insert WP core files in /tests/_wordpress/
        run: |
          curl -sL https://wordpress.org/latest.tar.gz | tar -xzf - --strip-components=1 -C tests/_wordpress

      - name: Update /tests/.env to set CHROMEDRIVER_BINARY to action runner pre-installed location
        run: |
          # Get the absolute resolved path of the binary
          CHROMEDRIVER_PATH=$(realpath $(which chromedriver))
          
          # Force it directly into Codeception's parameter file (.env)
          # This replaces any existing CHROMEDRIVER_BINARY line with the real path
          sed -i "s|CHROMEDRIVER_BINARY=.*|CHROMEDRIVER_BINARY=$CHROMEDRIVER_PATH|g" tests/.env

      - name: Load /tests/.env
        uses: xom9ikk/dotenv@v2
        with:
          path: ./tests
      
      - name: Run wp-browser tests
        run: vendor/bin/codecept run
        env:
          # Override ports to match standard GHA runner setup
          CHROMEDRIVER_PORT: 9515
          BUILTIN_SERVER_PORT: 8080