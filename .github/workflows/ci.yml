name: Theme CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      # Cache composer dependencies to make future runs faster
      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      # Install the packages in your composer.json
      - name: Composer install
        run: composer install --no-progress --prefer-dist

      # Download .wp-stubs/wordpress-stubs.php file to feed to PHPStan
      - name: Download WordPress Stubs
        run: |
          mkdir -p .wp-stubs
          curl -sS https://raw.githubusercontent.com/php-stubs/wordpress-stubs/master/wordpress-stubs.php -o .wp-stubs/wordpress-stubs.php

      - name: PHP Syntax smoke test
        run: |
          find . -name "*.php" -type f -not -path "./vendor/*" -not -path "./node_modules/*" -exec php -l {} \;

      # Run PHPStan with ci-specific neon file that has .wp-stubs/ in scanDirectories
      - name: Run PHPStan
        run: vendor/bin/phpstan analyze . --configuration=phpstan-ci.neon --memory-limit=1G

      # Run PHP CodeSniffer with our phpcs.xml.dist configuration plus ignoring the ci-specific .wp-stubs/ directory
      - name: Run PHPCS
        run: vendor/bin/phpcs . --ignore=.wp-stubs/

  # New parallel job specifically handles the functional/integration tests
  wp-browser-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer
          extensions: mysql, sqlite3, pdo_sqlite # Ensure SQLite tools are ready

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Composer install
        run: composer install --no-progress --prefer-dist

      # Create the folder where your wpRootFolder configuration expects WordPress core
      - name: Setup WordPress Core directory
        run: mkdir -p tests/_wordpress

      # Download and unzip clean WordPress core directly into the target folder
      - name: Install WordPress Core files
        run: |
          curl -sLO https://wordpress.org/latest.zip
          unzip -q latest.zip
          mv wordpress/* tests/_wordpress/
          rm -rf wordpress latest.zip

      # Set the chromedriver location based on the action runner
      - name: Locate Chromedriver Binary
        run: |
          # Get the absolute resolved path of the binary
          CHROMEDRIVER_PATH=$(realpath $(which chromedriver))
          
          # Force it directly into Codeception's parameter file (.env)
          # This replaces any existing CHROMEDRIVER_BINARY line with the real path
          sed -i "s|CHROMEDRIVER_BINARY=.*|CHROMEDRIVER_BINARY=$CHROMEDRIVER_PATH|g" tests/.env

       # Fix errors about .env variables not being defined
      - name: Load Dotenv variables
        uses: xom9ikk/dotenv@v2
        with:
          path: ./tests
      
      # Execute your test suites
      - name: Run wp-browser tests
        run: vendor/bin/codecept run
        env:
          # Override chromedriver location to match GHA runner pre-installed 
          CHROMEDRIVER_PORT: 9515
          BUILTIN_SERVER_PORT: 8080